<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta property="og:title" content="영업팀 경비 입력">
<meta property="og:description" content="삼육오 영업팀 경비 입력">
<title>영업팀 경비 입력</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f0;padding:12px}
.section{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:500;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid #eee}
input,select,textarea{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit}
input[type=date]{color:#1a1a1a}
input[type=checkbox]{width:16px!important;height:16px;cursor:pointer;flex-shrink:0}
textarea{resize:none;height:70px}
.lbl{font-size:12px;color:#888;margin-bottom:4px;margin-top:8px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.add-btn{width:100%;padding:8px;border:0.5px dashed #ccc;border-radius:8px;background:transparent;color:#888;font-size:13px;cursor:pointer;margin-top:8px}
.item-box{border:0.5px solid #eee;border-radius:8px;padding:10px;margin-top:8px;position:relative}
.del-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:#bbb;cursor:pointer;font-size:18px;line-height:1;padding:0}
.req{color:#E24B4A;margin-left:2px}
.type-chip{padding:10px 14px;border-radius:10px;border:0.5px solid #ccc;font-size:13px;cursor:pointer;background:#fff;color:#1a1a1a;text-align:center;transition:all 0.15s;flex:1}
.type-chip.on{background:#1D9E75;border-color:#1D9E75;color:#fff;font-weight:500}
.type-wrap{display:flex;gap:8px}
.file-label{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:0.5px dashed #ccc;border-radius:8px;color:#888;font-size:13px;cursor:pointer;margin-top:6px}
.add-photo-btn{display:none;width:100%;padding:8px;border:0.5px dashed #1D9E75;border-radius:8px;background:transparent;color:#1D9E75;font-size:13px;cursor:pointer;margin-top:6px;text-align:center}
.preview-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.preview-wrap canvas{width:80px;height:80px;object-fit:cover;border-radius:8px;border:0.5px solid #eee}
.loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading.show{display:flex}
.loading-text{color:#fff;font-size:15px;font-weight:500}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid #fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.complete-box{display:none;background:#E1F5EE;border:0.5px solid #1D9E75;border-radius:12px;padding:1.5rem;margin-bottom:12px;text-align:center}
.complete-box.show{display:block}
.complete-title{font-size:18px;font-weight:500;color:#0F6E56;margin-bottom:8px}
.complete-desc{font-size:13px;color:#1D9E75;margin-bottom:16px}
.new-btn{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
.confirm-box{display:none;background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem;margin-bottom:12px}
.confirm-box.show{display:block}
.confirm-title{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:12px;padding-bottom:8px;border-bottom:0.5px solid #eee}
.confirm-row{display:flex;padding:6px 0;border-bottom:0.5px solid #f5f5f0;gap:8px}
.confirm-label{font-size:12px;color:#888;min-width:70px;flex-shrink:0}
.confirm-value{font-size:12px;color:#1a1a1a;flex:1;line-height:1.5}
.confirm-section{margin-top:12px}
.confirm-section-title{font-size:11px;font-weight:500;color:#888;margin-bottom:6px;padding:4px 0;border-bottom:0.5px solid #eee}
.confirm-item{background:#f5f5f0;border-radius:8px;padding:8px 10px;margin-top:6px;font-size:12px;line-height:1.6}
.confirm-btns{display:flex;gap:8px;margin-top:16px;padding-bottom:30px}
.btn-back{flex:1;padding:14px;background:#f5f5f0;color:#555;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer}
.btn-final{flex:2;padding:14px;background:#1D9E75;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer}
.btn-final:disabled{background:#aaa;cursor:not-allowed}
.proj-section{display:none}
.safety-section{display:none}
.card-info{display:none;margin-top:8px;padding:10px 12px;background:#E6F1FB;border:0.5px solid #185FA5;border-radius:8px;font-size:12px;color:#0C447C}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">불러오는 중...</div>
</div>

<div style="padding:12px 0 4px">
  <p style="font-size:16px;font-weight:500;margin-bottom:2px">영업팀 경비 입력</p>
  <p id="today-date" style="font-size:12px;color:#888"></p>
</div>

<!-- 완료 화면 -->
<div class="complete-box" id="complete-box">
  <div class="complete-title">✅ 제출 완료!</div>
  <div class="complete-desc" id="complete-desc"></div>
  <button class="new-btn" onclick="resetForm()">새로 입력하기</button>
</div>

<!-- 확인 화면 -->
<div class="confirm-box" id="confirm-box">
  <div class="confirm-title">📋 입력 내용 확인</div>
  <div id="confirm-content"></div>
  <div class="confirm-btns">
    <button class="btn-back" onclick="backToForm()">✏️ 수정하기</button>
    <button class="btn-final" id="final-btn" onclick="finalSubmit()">최종 제출</button>
  </div>
</div>

<!-- 입력 폼 -->
<div id="main-form">

<div class="section">
  <div class="sec-title">날짜 <span class="req">*</span></div>
  <input type="date" id="work-date">
</div>

<div class="section">
  <div class="sec-title">작성자 <span class="req">*</span></div>
  <select id="writer-sel" onchange="onWriterChange()">
    <option value="">— 선택 —</option>
  </select>
  <div class="card-info" id="card-info"></div>
</div>

<div class="section">
  <div class="sec-title">경비 구분 <span class="req">*</span></div>
  <div class="type-wrap">
    <div class="type-chip" id="type-safety" onclick="selType('safety')">석면유지보수</div>
    <div class="type-chip" id="type-site" onclick="selType('site')">현장방문</div>
  </div>
</div>

<!-- 프로젝트 선택 (공통) -->
<div class="section proj-section" id="proj-section">
  <div class="sec-title">프로젝트 선택 <span class="req">*</span></div>
  <select id="proj-sel"><option value="">— 프로젝트 선택 —</option></select>
</div>

<!-- 석면유지보수 전용 -->
<div class="section safety-section" id="safety-section">
  <div class="sec-title">작업 정보</div>
  <div class="lbl">작업 인원 (수기 입력)</div>
  <input type="text" id="safety-workers" placeholder="예) 김원일, 홍길동">
  <div class="lbl" style="margin-top:8px">작업 시간</div>
  <div style="display:flex;align-items:center;gap:6px">
    <select id="t-start" style="flex:1"></select>
    <span style="color:#888;font-size:13px;flex-shrink:0">~</span>
    <select id="t-end" style="flex:1"></select>
  </div>
</div>

<!-- 경비 내역 -->
<div class="section">
  <div class="sec-title">경비 사용 내역 <span class="req">*</span></div>
  <div id="expense-list"></div>
  <button class="add-btn" onclick="addExpense()">+ 경비 항목 추가</button>
</div>

<!-- 영수증 -->
<div class="section">
  <div class="sec-title">📷 영수증 첨부 (선택)</div>
  <label class="file-label">
    <input type="file" id="receipt-input" accept="image/*" multiple style="display:none" onchange="previewFiles(this,false)">
    📷 사진 촬영 또는 갤러리 선택
  </label>
  <div class="add-photo-btn" id="add-photo-btn" onclick="document.getElementById('add-receipt-input').click()">
    📷 사진 추가 촬영
    <input type="file" id="add-receipt-input" accept="image/*" multiple style="display:none" onchange="previewFiles(this,true)">
  </div>
  <div class="preview-wrap" id="receipt-preview"></div>
  <p style="font-size:11px;color:#bbb;margin-top:6px">사진 하단에 날짜/구분 정보가 자동 표시됩니다</p>
</div>

<!-- 메모 -->
<div class="section">
  <div class="sec-title">메모 (선택)</div>
  <textarea id="memo" placeholder="특이사항이나 추가 내용을 입력하세요"></textarea>
</div>

<div style="padding-bottom:30px">
  <button class="btn-final" onclick="showConfirm()" style="width:100%;padding:14px;font-size:15px">내용 확인하기</button>
</div>

</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzNI4xmJT7kaA06gosQ2BE6kg8i5i1M-z_4tq3jsr32-nftkN0sH86ox9xEmVo0oe9IoQ/exec';
const SHEET_ID='1oaP3lpfd6_HzvG6pg_lPWc-UYNr8rNfq4tHrD0msYBc';

let masterData={workers:[],projects:[],safetyProjects:[],expenseItems:[]};
let processedFiles=[];
let currentType='';
let expCount=0;
let submitPayload=null;

const todayObj=new Date();
document.getElementById('today-date').textContent=todayObj.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
document.getElementById('work-date').value=todayObj.toISOString().split('T')[0];

function getSelectedDate(){
  const v=document.getElementById('work-date').value;
  if(!v)return '';
  const d=new Date(v+'T00:00:00');
  return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

async function loadMasterData(){
  showLoading('데이터 불러오는 중...');
  try {
    const [workers,items,proj,safetyProj]=await Promise.all([
      fetch(`${SCRIPT_URL}?action=getBizWorkers`).then(r=>r.json()),
      fetch(`${SCRIPT_URL}?action=getExpenseItems`).then(r=>r.json()),
      fetch(`${SCRIPT_URL}?action=getProjects`).then(r=>r.json()),
      fetch(`${SCRIPT_URL}?action=getSafetyProjects`).then(r=>r.json()),
    ]);
    masterData.workers=workers.data||[];
    masterData.expenseItems=items.data||[];
    masterData.projects=proj.data||[];
    masterData.safetyProjects=safetyProj.data||[];
    buildWorkerSelect();
    buildTimePickers();
  } catch(e){console.error(e);}
  hideLoading();
}

function buildWorkerSelect(){
  const sel=document.getElementById('writer-sel');
  sel.innerHTML='<option value="">— 선택 —</option>';
  masterData.workers.forEach(w=>{
    const opt=document.createElement('option');
    opt.value=JSON.stringify(w);
    opt.textContent=w.name;
    sel.appendChild(opt);
  });
}

function onWriterChange(){
  const val=document.getElementById('writer-sel').value;
  const info=document.getElementById('card-info');
  if(!val){info.style.display='none';return;}
  const w=JSON.parse(val);
  info.style.display='block';
  info.textContent=`💳 ${w.cardCo}(${w.last4})`;
}

function selType(type){
  currentType=type;
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.remove('on'));
  document.getElementById('type-'+type).classList.add('on');
  document.getElementById('proj-section').style.display='block';
  // 프로젝트 목록 업데이트
  const sel=document.getElementById('proj-sel');
  sel.innerHTML='<option value="">— 프로젝트 선택 —</option>';
  const list=type==='safety'?masterData.safetyProjects:masterData.projects;
  list.forEach(p=>{
    const opt=document.createElement('option');
    opt.value=`${p.biz}|${p.projNum}|${p.projName}`;
    opt.textContent=`[${p.projNum}] ${p.projName}`;
    sel.appendChild(opt);
  });
  // 석면유지보수 전용 섹션
  document.getElementById('safety-section').style.display=type==='safety'?'block':'none';
}

function buildTimePickers(){
  makeTimes('t-start',5,20,'08:00');
  makeTimes('t-end',5,20,'17:00');
}

function makeTimes(selId,from,to,defVal){
  const sel=document.getElementById(selId);sel.innerHTML='';
  for(let h=from;h<=to;h++)for(let m=0;m<60;m+=30){
    if(h===to&&m>0)break;
    const t=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    sel.innerHTML+=`<option>${t}</option>`;
  }
  sel.value=defVal;
}

function addExpense(){
  expCount++;const id=expCount;
  const itemHtml=masterData.expenseItems.map(i=>`<option>${i}</option>`).join('');
  const div=document.createElement('div');div.className='item-box';div.id='exp-'+id;
  div.innerHTML=`
    <button class="del-btn" onclick="document.getElementById('exp-${id}').remove()">×</button>
    <div class="row2" style="margin-top:0">
      <div><div class="lbl" style="margin-top:0">금액</div><input type="number" id="exp-amt-${id}" placeholder="0" style="text-align:right"></div>
      <div><div class="lbl" style="margin-top:0">항목</div><select id="exp-item-${id}"><option value="">선택</option>${itemHtml}</select></div>
    </div>`;
  document.getElementById('expense-list').appendChild(div);
}

function addWatermark(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        canvas.width=img.width;canvas.height=img.height;
        const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0);
        const writerVal=document.getElementById('writer-sel').value;
        const writerName=writerVal?JSON.parse(writerVal).name:'';
        const typeLabel=currentType==='safety'?'석면유지보수':currentType==='site'?'현장방문':'';
        const watermark=`${getSelectedDate()} / ${typeLabel} / ${writerName}`;
        const fontSize=Math.max(20,Math.round(img.width*0.035));
        ctx.font=`bold ${fontSize}px sans-serif`;
        const padding=Math.round(img.width*0.03),textW=ctx.measureText(watermark).width,textH=fontSize,boxPad=Math.round(fontSize*0.4);
        const boxX=(img.width-textW)/2-boxPad,boxY=img.height-padding-textH-boxPad*2;
        ctx.fillStyle='rgba(0,0,0,0.45)';ctx.beginPath();ctx.roundRect(boxX,boxY,textW+boxPad*2,textH+boxPad*2,6);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.92)';ctx.textBaseline='top';ctx.fillText(watermark,(img.width-textW)/2,boxY+boxPad);
        canvas.toBlob(blob=>{const r2=new FileReader();r2.onload=e2=>resolve({dataUrl:e2.target.result,canvas,name:file.name});r2.readAsDataURL(blob);},'image/jpeg',0.85);
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });
}

async function previewFiles(input,isAdd){
  const wrap=document.getElementById('receipt-preview');
  if(!isAdd){wrap.innerHTML='';processedFiles=[];}
  const files=Array.from(input.files);
  for(const f of files){
    const result=await addWatermark(f);
    processedFiles.push({dataUrl:result.dataUrl,name:result.name});
    const c=result.canvas;c.style.cssText='width:80px;height:80px;object-fit:cover;border-radius:8px;border:0.5px solid #eee';
    wrap.appendChild(c);
  }
  document.getElementById('add-photo-btn').style.display='block';input.value='';
}

function showLoading(msg){document.getElementById('loading-text').textContent=msg||'처리 중...';document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}

function showConfirm(){
  const writerVal=document.getElementById('writer-sel').value;
  if(!writerVal){alert('작성자를 선택해주세요.');return;}
  if(!currentType){alert('경비 구분을 선택해주세요.');return;}
  const proj=document.getElementById('proj-sel').value;
  if(!proj){alert('프로젝트를 선택해주세요.');return;}

  const writer=JSON.parse(writerVal);
  const projParts=proj.split('|');
  const expenses=[];
  document.querySelectorAll('.item-box[id^="exp-"]').forEach(box=>{
    const id=box.id.replace('exp-','');
    const amt=parseInt(document.getElementById('exp-amt-'+id)?.value)||0;
    const item=document.getElementById('exp-item-'+id)?.value||'';
    if(amt>0)expenses.push({amount:amt,item});
  });
  if(expenses.length===0){alert('경비 항목을 하나 이상 입력해주세요.');return;}

  const typeLabel=currentType==='safety'?'석면유지보수':'현장방문';
  const safetyWorkers=document.getElementById('safety-workers').value.trim();
  const timeStart=document.getElementById('t-start').value;
  const timeEnd=document.getElementById('t-end').value;
  const memo=document.getElementById('memo').value.trim();

  submitPayload={
    date:getSelectedDate(),
    writerName:writer.name,
    cardCo:writer.cardCo,
    last4:writer.last4,
    type:currentType,
    typeLabel,
    projNum:projParts[1]||'',
    projName:projParts[2]||'',
    projBiz:projParts[0]||'',
    safetyWorkers,
    timeStart,timeEnd,
    expenses,
    imageCount:processedFiles.length,
    memo,
    submitTime:new Date().toLocaleString('ko-KR')
  };

  let html=`
    <div class="confirm-row"><span class="confirm-label">날짜</span><span class="confirm-value">${submitPayload.date}</span></div>
    <div class="confirm-row"><span class="confirm-label">작성자</span><span class="confirm-value">${submitPayload.writerName}</span></div>
    <div class="confirm-row"><span class="confirm-label">카드</span><span class="confirm-value">${submitPayload.cardCo}(${submitPayload.last4})</span></div>
    <div class="confirm-row"><span class="confirm-label">구분</span><span class="confirm-value">${submitPayload.typeLabel}</span></div>
    <div class="confirm-row"><span class="confirm-label">현장</span><span class="confirm-value">${submitPayload.projName}</span></div>
    <div class="confirm-row"><span class="confirm-label">프로젝트</span><span class="confirm-value">${submitPayload.projNum}</span></div>`;

  if(currentType==='safety'){
    html+=`<div class="confirm-row"><span class="confirm-label">작업인원</span><span class="confirm-value">${submitPayload.safetyWorkers||'미입력'}</span></div>`;
    html+=`<div class="confirm-row"><span class="confirm-label">작업시간</span><span class="confirm-value">${submitPayload.timeStart}~${submitPayload.timeEnd}</span></div>`;
  }

  if(expenses.length>0){
    html+=`<div class="confirm-section"><div class="confirm-section-title">💳 경비 내역</div>`;
    let total=0;
    expenses.forEach(e=>{
      html+=`<div class="confirm-item">${e.item} / <strong>${Number(e.amount).toLocaleString()}원</strong></div>`;
      total+=e.amount;
    });
    html+=`<div style="text-align:right;margin-top:6px;font-size:13px;font-weight:500;color:#1D9E75">합계: ${total.toLocaleString()}원</div></div>`;
  }

  html+=`<div class="confirm-row"><span class="confirm-label">영수증</span><span class="confirm-value">${processedFiles.length>0?processedFiles.length+'장 첨부':'첨부 없음'}</span></div>`;
  if(memo) html+=`<div class="confirm-row"><span class="confirm-label">메모</span><span class="confirm-value">${memo}</span></div>`;

  document.getElementById('confirm-content').innerHTML=html;
  document.getElementById('main-form').style.display='none';
  document.getElementById('confirm-box').classList.add('show');
  window.scrollTo(0,0);
}

function backToForm(){
  document.getElementById('confirm-box').classList.remove('show');
  document.getElementById('main-form').style.display='block';
  window.scrollTo(0,0);
}

async function finalSubmit(){
  if(!submitPayload)return;
  document.getElementById('final-btn').disabled=true;
  showLoading('저장 중...');
  try {
    await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({type:'bizExpense',...submitPayload})});
    for(let i=0;i<processedFiles.length;i++){
      showLoading(`영수증 업로드 중... (${i+1}/${processedFiles.length})`);
      await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({type:'bizImage',date:submitPayload.date,writerName:submitPayload.writerName,imageData:processedFiles[i].dataUrl,fileName:`${submitPayload.date}_${submitPayload.projNum}_${submitPayload.writerName}_${i+1}.jpg`})});
    }
    hideLoading();
    document.getElementById('final-btn').disabled=false;
    document.getElementById('confirm-box').classList.remove('show');
    document.getElementById('complete-box').classList.add('show');
    document.getElementById('complete-desc').textContent=`${submitPayload.writerName} / ${submitPayload.typeLabel} / ${submitPayload.projName}`;
    window.scrollTo(0,0);
    submitPayload=null;
  } catch(err){
    hideLoading();alert('제출 중 오류가 발생했습니다.\n'+err.message);
    document.getElementById('final-btn').disabled=false;
  }
}

function resetForm(){
  document.getElementById('complete-box').classList.remove('show');
  document.getElementById('main-form').style.display='block';
  document.getElementById('work-date').value=todayObj.toISOString().split('T')[0];
  document.getElementById('writer-sel').value='';
  document.getElementById('card-info').style.display='none';
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.remove('on'));
  document.getElementById('proj-section').style.display='none';
  document.getElementById('safety-section').style.display='none';
  document.getElementById('proj-sel').innerHTML='<option value="">— 프로젝트 선택 —</option>';

  document.getElementById('expense-list').innerHTML='';
  document.getElementById('receipt-preview').innerHTML='';
  document.getElementById('add-photo-btn').style.display='none';

}
